# Laravel 13 + Symfony 8 require PHP 8.4
# Vite 8 requires Node 20.19+ or 22.12+ (nix nodejs_20 is only 20.18.x)
[variables]
NIXPACKS_PHP_VERSION = "8.4"
NIXPACKS_PHP_ROOT_DIR = "/app/public"
NIXPACKS_NODE_VERSION = "22"

# Explicit packages only — no "..." (avoids nodejs version collisions).
[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_22"]
