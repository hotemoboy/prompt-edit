# Laravel 13 + Symfony 8 require PHP 8.4 (Railway defaults to 8.3 without this)
[variables]
NIXPACKS_PHP_VERSION = "8.4"
NIXPACKS_PHP_ROOT_DIR = "/app/public"

# "..." keeps Nixpacks auto-detected PHP packages (including Composer).
# Do NOT override with only ["php84", "nodejs_20"] — that drops Composer.
[phases.setup]
nixPkgs = ["...", "nodejs_20"]
