# Laravel 13 + Symfony 8 require PHP 8.4
[variables]
NIXPACKS_PHP_VERSION = "8.4"
NIXPACKS_PHP_ROOT_DIR = "/app/public"

# Explicit packages only — no "..." (avoids nodejs_18 vs nodejs_20 collision).
# Composer must be listed explicitly when overriding nixPkgs.
[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20"]
